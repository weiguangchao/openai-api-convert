apiKey: ""
upstreams:
  - baseUrl: ""
    apiKey: ""
    capabilities:
      functionTools: true
      customTools: true
      parallelToolCalls: true
    # Provider-native request option, needed for a DeepSeek V4 forced Function probe:
    # thinking:
    #   type: disabled
port: 8417
firstEventTimeoutMs: 30000
outputIdleTimeoutMs: 60000
statePolicy:
  responseRetentionDays: 30
  attemptRetentionDays: 7
  cleanupThresholdBytes: 8589934592
  hardLimitBytes: 10737418240
logging:
  level: info
  # path defaults to dirname(statePath)/logs/
  retentionDays: 7
# Required only in ignored config.test.yaml before running npm test:
# releasePreflight:
#   model: ""
