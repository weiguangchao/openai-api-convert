apiKey: ""
upstreams:
  - baseUrl: ""
    apiKey: ""
    capabilities:
      functionTools: true
      customTools: true
      parallelToolCalls: true
port: 8417
firstEventTimeoutMs: 30000
outputIdleTimeoutMs: 60000
statePolicy:
